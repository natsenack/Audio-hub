app-id: io.github.linux-audio-manager
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: linux-audio-manager

finish-args:
  # X11 + Wayland support
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

  # Graphics
  - --device=dri

  # Audio/PipeWire
  - --system-talk-name=org.freedesktop.DBus
  - --system-talk-name=org.freedesktop.DBus.Properties
  - --talk-name=org.freedesktop.DBus
  - --talk-name=org.freedesktop.DBus.Properties
  - --talk-name=org.freedesktop.portal.Settings

  # Notifications (system tray)
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.dbusmenu

  # Config persistence
  - --filesystem=xdg-config

cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: linux-audio-manager
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-build-isolation --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/yourusername/linux-audio-manager.git
        tag: v0.1.0
        # commit: will be filled by Flathub CI

post-install:
  # Ensure desktop file is registered
  - install -Dm644 data/io.github.linux-audio-manager.desktop
    /app/share/applications/io.github.linux-audio-manager.desktop
  
  # AppStream metadata
  - install -Dm644 data/io.github.linux-audio-manager.metainfo.xml
    /app/share/metainfo/io.github.linux-audio-manager.metainfo.xml
  
  # Install icons (hicolor theme)
  - install -Dm644 data/icons/hicolor/scalable/apps/io.github.linux-audio-manager.svg
    /app/share/icons/hicolor/scalable/apps/io.github.linux-audio-manager.svg
  - for size in 16 32 48 64 128 256; do install -Dm644
    data/icons/hicolor/${size}x${size}/apps/io.github.linux-audio-manager.png
    /app/share/icons/hicolor/${size}x${size}/apps/io.github.linux-audio-manager.png; done
