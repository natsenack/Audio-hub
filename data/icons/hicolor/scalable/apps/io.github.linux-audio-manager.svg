<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Optimized version for GNOME HIG -->
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="128" cy="128" r="128" fill="url(#mainGradient)" filter="url(#shadow)"/>
  
  <!-- Inner highlight -->
  <circle cx="128" cy="128" r="124" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Speaker symbol - simplified -->
  <g fill="#ffffff">
    <!-- Speaker cone -->
    <path d="M 85 90 L 110 115 L 110 155 L 85 180 Q 75 165 75 135 Q 75 105 85 90 Z" fill="#ffffff"/>
  </g>
  
  <!-- Sound waves -->
  <g stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wave 1 -->
    <path d="M 135 115 Q 150 100 165 115" opacity="0.95"/>
    <path d="M 135 155 Q 150 170 165 155" opacity="0.95"/>
    
    <!-- Wave 2 -->
    <path d="M 170 105 Q 190 85 210 105" opacity="0.7"/>
    <path d="M 170 165 Q 190 185 210 165" opacity="0.7"/>
  </g>
  
  <!-- Subtle center light -->
  <circle cx="100" cy="110" r="6" fill="rgba(255,255,255,0.4)"/>
</svg>
