<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (modern GNOME style) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3584e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c71d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="url(#bgGradient)"/>
  
  <!-- Rounded background for icon area -->
  <circle cx="128" cy="128" r="100" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Speaker/Audio symbol -->
  <!-- Cone of speaker -->
  <path d="M 90 80 L 110 100 L 110 160 L 90 180 Z" fill="url(#waveGradient)" stroke="none"/>
  
  <!-- Sound wave arcs (representing audio/frequency) -->
  <g stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- Arc 1 (close) -->
    <path d="M 130 110 Q 140 100 150 110" opacity="0.9"/>
    <path d="M 130 150 Q 140 160 150 150" opacity="0.9"/>
    
    <!-- Arc 2 (medium) -->
    <path d="M 155 100 Q 170 85 185 100" opacity="0.7"/>
    <path d="M 155 160 Q 170 175 185 160" opacity="0.7"/>
    
    <!-- Arc 3 (far) - subtle -->
    <path d="M 190 95 Q 205 75 220 95" opacity="0.5"/>
    <path d="M 190 165 Q 205 185 220 165" opacity="0.5"/>
  </g>
  
  <!-- Highlight on speaker cone -->
  <ellipse cx="95" cy="100" rx="8" ry="15" fill="rgba(255,255,255,0.3)"/>
</svg>
