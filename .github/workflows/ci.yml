name: CI Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint 2>/dev/null || true
      - name: Lint Python files
        run: |
          python -m py_compile audio-hub.py audio_device_classifier.py audiohub/__init__.py audiohub/browser_streams.py audiohub/gtk_app.py audiohub/models.py audiohub/paths.py audiohub/pipewire.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build DEB package
        run: bash build.sh || echo "Build requires dpkg-deb"
      - name: Build extension
        run: bash build-extension.sh
      - name: Verify outputs
        run: |
          [ -f build/audio-hub@localhost.github.io.zip ] && echo "✓ Extension built"
          [ -f build/*.deb ] || echo "⚠ DEB not built (expected in CI)"
