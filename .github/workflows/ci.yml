name: CI Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint 2>/dev/null || true
      - name: Lint Python files
        run: |
          python -m py_compile linux-audio-manager.py 2>/dev/null || true
          python -m py_compile launch.sh 2>/dev/null || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build DEB package
        run: bash build.sh || echo "Build requires dpkg-deb"
      - name: Build extension
        run: bash build-extension.sh
      - name: Verify outputs
        run: |
          [ -f build/linux-audio-manager@localhost.github.io.zip ] && echo "✓ Extension built"
          [ -f build/*.deb ] || echo "⚠ DEB not built (expected in CI)"
